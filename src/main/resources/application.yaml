spring:
  application:
    name: meta-forge-platform
  jpa:
    open-in-view: false
  profiles:
    active: dev
  freemarker:
    suffix: .ftl
    template-loader-path: classpath:/templates/
    cache: false
    charset: UTF-8

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://10.210.40.40:3306/rbac_data?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&cacheResultSetMetadata=true&maintainTimeStats=false
    username: ${DB_USER:kyc_uat}
    password: ${DB_PASS:ILoveKYC}

    hikari:
      pool-name: main-mysql-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
      connection-timeout: ${DB_POOL_CONN_TIMEOUT:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT:5000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECT:0}
      keepalive-time: 300000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

    cache:
      type: redis
      redis:
        time-to-live: 300000
        cache-null-values: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: false

logging:
  level:
    org.springframework.security: DEBUG